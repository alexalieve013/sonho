<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #e6e6e6;
}
.login-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    width: 300px;
}
h2 {
    text-align: center;
}
input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 100%;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    font-weight: bold;
}
button:hover {
    background: #45a049;
}
#mensagem {
    color: red;
    text-align: center;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="verificarLogin()">Entrar</button>
    <p id="mensagem"></p>
</div>

<script>
function verificarLogin() {
    var usuario = document.getElementById("usuario").value;
    var senha = document.getElementById("senha").value;

    if (usuario === "12312339964" && senha === "1608") {
        window.location.href = "home.html";
    } else {
        document.getElementById("mensagem").innerText = "Usuário ou senha incorretos!";
    }
}
</script>

</body>
</html>
